spring.application.name=spotlocalpro

# Server Configuration
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}
file.upload.dir=${FILE_UPLOAD_DIR:/tmp/uploads}

# JWT Configuration
jwt.secret=${JWT_SECRET}

# Email Configuration (Zoho SMTP)
spring.mail.host=${MAIL_HOST:smtp.zoho.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.zoho.com}
spring.mail.properties.mail.smtp.from=${MAIL_FROM:hello@spotlocalpro.com}

# Admin Configuration
admin.notification.email=${ADMIN_EMAIL:hello@spotlocalpro.com}

# Stripe Configuration
stripe.api.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}

# Application URLs
app.base.url=${FRONTEND_BASE_URL}
FRONTEND_BASE_URL=${FRONTEND_BASE_URL}

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# OTP Configuration
otp.expiry.minutes=${OTP_EXPIRY_MINUTES:10}
otp.resend.cooldown.seconds=${OTP_RESEND_COOLDOWN:60}

# Booking Security
BOOKING_ACTION_SECRET=${BOOKING_ACTION_SECRET}

# Logging Configuration
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.servicepoint=${LOG_LEVEL_APP:INFO}

# Production Optimizations
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.http2.enabled=true